<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faelyn</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0908;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;touch-action:none;user-select:none}

#grain{position:fixed;inset:0;pointer-events:none;z-index:1;opacity:.035;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.82' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:256px}

.screen{position:fixed;inset:0;transition:opacity .85s cubic-bezier(.4,0,.2,1)}
.off{opacity:0;pointer-events:none}

/* ══════════════
   LOGIN
══════════════ */
#s-login{
  z-index:200;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(160deg,#0e0a08 0%,#1a0f0c 50%,#120910 100%);
}
#login-box{
  width:min(360px,88vw);
  display:flex;flex-direction:column;align-items:center;
  text-align:center;
}
#login-title{
  font-size:clamp(36px,7vw,58px);font-weight:100;letter-spacing:.22em;
  text-transform:uppercase;color:#e8d5c4;margin-bottom:8px;
  animation:riseIn 1.4s .1s both;
}
#login-sub{
  font-size:8.5px;letter-spacing:.5em;text-transform:uppercase;
  color:#6a4a38;margin-bottom:48px;
  animation:riseIn 1.4s .4s both;
}
.login-field{
  width:100%;margin-bottom:14px;
  background:rgba(255,255,255,.04);border:1px solid #2a1e18;
  padding:14px 20px;font-size:12px;letter-spacing:.12em;color:#e8d5c4;
  outline:none;font-family:inherit;text-align:center;
  transition:border-color .3s;
  animation:riseIn 1.4s .6s both;
}
#p-input{animation-delay:.72s}
.login-field::placeholder{color:#3a2820;letter-spacing:.18em}
.login-field:focus{border-color:#6a4a38}
#login-err{
  font-size:8px;letter-spacing:.38em;text-transform:uppercase;
  color:#8a3828;height:14px;margin-bottom:14px;
  opacity:0;transition:opacity .3s;
  animation:riseIn 1.4s .85s both;
}
#login-err.show{opacity:1}
#login-btn{
  width:100%;padding:14px;font-size:8.5px;letter-spacing:.48em;
  text-transform:uppercase;color:#a07860;
  border:1px solid #3a2820;background:transparent;cursor:pointer;
  font-family:inherit;transition:color .3s,border-color .3s;
  animation:riseIn 1.4s .95s both;
}
#login-btn:hover{color:#e8d5c4;border-color:#6a4a38}
@keyframes riseIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* ══════════════
   BIRTHDAY
══════════════ */
#s-bday{
  z-index:150;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:48px;
  background:linear-gradient(160deg,#120a08 0%,#1e0d0a 45%,#150810 100%);
}
.bday-el{opacity:0;transform:translateY(16px);transition:opacity .9s,transform .9s}
#bday-date{font-size:8.5px;letter-spacing:.55em;text-transform:uppercase;color:#6a4a38;margin-bottom:36px}
#bday-name{font-size:clamp(40px,8vw,80px);font-weight:100;letter-spacing:.2em;text-transform:uppercase;color:#e8d5c4;line-height:1;margin-bottom:6px}
#bday-tag{font-size:9px;letter-spacing:.45em;text-transform:uppercase;color:#7a5a48;margin-bottom:50px}

/* bunny */
#bunny{width:44px;margin:0 auto 50px;opacity:.5}

#bday-btn{
  font-size:8.5px;letter-spacing:.48em;text-transform:uppercase;
  color:#a07860;border:1px solid #3a2820;padding:14px 34px;
  background:transparent;cursor:pointer;font-family:inherit;
  transition:color .3s,border-color .3s;
}
#bday-btn:hover{color:#e8d5c4;border-color:#6a4a38}

/* ══════════════
   GALLERY
══════════════ */
#s-gallery{z-index:10}
#gallery-cv{
  position:fixed;inset:0;width:100%;height:100%;
  display:block;cursor:grab;touch-action:none;outline:none;
}
#gallery-cv:active{cursor:grabbing}

#gl-loading{
  position:fixed;inset:0;z-index:50;background:#0a0908;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
  pointer-events:none;transition:opacity .8s;
}
#gl-label{font-size:8.5px;letter-spacing:.5em;text-transform:uppercase;color:#3a3530}
#gl-bar-wrap{width:90px;height:1px;background:#1a1815;overflow:hidden}
#gl-bar{height:100%;width:0%;background:#6a5a48;transition:width .06s linear}
#gl-pct{font-size:8px;letter-spacing:.4em;color:#2e2b27;font-variant-numeric:tabular-nums}

#gallery-hint{
  position:fixed;bottom:36px;left:50%;transform:translateX(-50%);
  font-size:8px;letter-spacing:.5em;text-transform:uppercase;color:#2e2b27;z-index:20;
  pointer-events:none;animation:breathe 3.5s 1s infinite;
}
@keyframes breathe{0%,100%{opacity:.2}50%{opacity:.75}}

/* music */
#music-btn{
  position:fixed;bottom:30px;right:32px;z-index:30;
  width:34px;height:34px;border-radius:50%;
  border:1px solid #1e1c18;background:transparent;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:border-color .3s;
}
#music-btn:hover{border-color:#6a4a38}
#music-btn svg{opacity:.35;transition:opacity .3s}
#music-btn.on svg{opacity:.8}

/* pips */
#pips{position:fixed;bottom:36px;left:32px;display:flex;gap:6px;z-index:30}
.pip{width:3.5px;height:3.5px;border-radius:50%;background:#1a1815;transition:background .5s}
.pip.on{background:#a07860}

/* ══════════════
   MODAL
══════════════ */
#modal{
  position:fixed;inset:0;z-index:300;
  background:rgba(10,9,8,.92);backdrop-filter:blur(14px);
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .6s;
}
#modal.on{opacity:1;pointer-events:all}
#modal-inner{max-width:400px;width:88%;text-align:center}
#modal-n{font-size:7.5px;letter-spacing:.6em;text-transform:uppercase;color:#3a3530;margin-bottom:34px}
#modal-title{font-size:clamp(22px,4vw,32px);font-weight:100;letter-spacing:.1em;color:#e8d5c4;line-height:1.3;margin-bottom:20px}
#modal-body{font-size:12px;line-height:2.1;color:#5a4e44;letter-spacing:.05em}
#modal-x{position:fixed;top:22px;right:32px;font-size:8.5px;letter-spacing:.42em;text-transform:uppercase;color:#2e2b27;cursor:pointer;z-index:310;transition:color .3s}
#modal-x:hover{color:#a07860}
</style>
</head>
<body>
<div id="grain"></div>

<!-- ══ LOGIN ══ -->
<div id="s-login" class="screen">
  <div id="login-box">
    <h1 id="login-title">Faelyn</h1>
    <p id="login-sub">private space</p>
    <input class="login-field" id="u-input" type="text"     placeholder="your name"     autocomplete="off" spellcheck="false">
    <input class="login-field" id="p-input" type="password" placeholder="your birthday"  autocomplete="off">
    <div id="login-err">incorrect — try again</div>
    <button id="login-btn">enter</button>
  </div>
</div>

<!-- ══ BIRTHDAY ══ -->
<div id="s-bday" class="screen off">
  <p  id="bday-date" class="bday-el">24 · 04 · 2006</p>
  <h2 id="bday-name" class="bday-el">Faelyn</h2>
  <p  id="bday-tag"  class="bday-el">happy birthday.</p>
  <div id="bunny" class="bday-el">
    <svg viewBox="0 0 48 56" fill="none" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="17" cy="9"  rx="4" ry="8" stroke="#c8a882" stroke-width=".7"/>
      <ellipse cx="31" cy="9"  rx="4" ry="8" stroke="#c8a882" stroke-width=".7"/>
      <ellipse cx="17" cy="9"  rx="2" ry="5.5" fill="#7a4838" opacity=".35"/>
      <ellipse cx="31" cy="9"  rx="2" ry="5.5" fill="#7a4838" opacity=".35"/>
      <ellipse cx="24" cy="32" rx="12" ry="11" stroke="#c8a882" stroke-width=".7"/>
      <circle  cx="20" cy="31" r="1.1" fill="#c8a882" opacity=".6"/>
      <circle  cx="28" cy="31" r="1.1" fill="#c8a882" opacity=".6"/>
      <ellipse cx="24" cy="34" rx="1"  ry=".6"  fill="#a07060" opacity=".5"/>
    </svg>
  </div>
  <button id="bday-btn" class="bday-el">my present for you →</button>
</div>

<!-- ══ GALLERY ══ -->
<div id="s-gallery" class="screen off">
  <div id="gl-loading">
    <div id="gl-label">Loading</div>
    <div id="gl-bar-wrap"><div id="gl-bar"></div></div>
    <div id="gl-pct">0%</div>
  </div>
  <canvas id="gallery-cv" tabindex="0"></canvas>
  <div id="gallery-hint">scroll · drag · click an image</div>
  <div id="pips">
    <div class="pip" id="p0"></div><div class="pip" id="p1"></div>
    <div class="pip" id="p2"></div><div class="pip" id="p3"></div>
    <div class="pip" id="p4"></div>
  </div>
  <button id="music-btn" title="Toggle ambient music">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="#c8a882" stroke-width=".9">
      <path d="M5 2.5l7-1.5v8.5M5 11V2.5M5 11a2 2 0 11-3.5-1.3M12 9a2 2 0 11-3.5-1.3"/>
    </svg>
  </button>
</div>

<!-- ══ MODAL ══ -->
<div id="modal">
  <div id="modal-inner">
    <div id="modal-n"></div>
    <div id="modal-title"></div>
    <div id="modal-body"></div>
  </div>
  <div id="modal-x">close</div>
</div>

<script>
// ─────────────────────────────────────────────────────────
// IMAGES
// Put your photos in an "image/" folder next to index.html
// Name them: 1.jpg, 2.jpg, 3.jpg … (or .png / .webp)
// The gallery will tile them infinitely.
// ─────────────────────────────────────────────────────────
const IMAGES = [
  'image/1.jpg',
  'image/2.jpg',
  'image/3.jpg',
  'image/4.jpg',
  'image/5.jpg',
];
// If an image fails to load it falls back to the next one — nothing breaks.

// ─────────────────────────────────────────────────────────
// MESSAGES  — edit freely
// ─────────────────────────────────────────────────────────
const MESSAGES = [
  { n:'001', title:'you were not made for ordinary light',          body:'The world didn’t build you to blend into it, it built itself around you and hoped you wouldn’t notice.' },
  { n:'002', title:'You changed how things feel',  body:'If there were older languages still spoken, they’d probably use them for you, Not to describe you that would be too small but to admit they don’t quite have the right words.' },
  { n:'003', title:'The way you hold a room',      body:'You don\'t try to fill it. You just exist in it, and that ends up being enough.' },
  { n:'004', title:'I like how you pay attention', body:'To things that don\'t require it. That\'s rare. Most people save their attention for the obvious.' },
  { n:'005', title:'There\'s a specific laugh',    body:'The one you do when something catches you off guard. I\'ve been collecting those without mentioning it.' },
  { n:'006', title:'You\'re not uncomfortable in silence', body:'Most people are. You let it exist without filling it. That requires a certain kind of trust.' },
  { n:'007', title:'The details you notice',       body:'Small ones. Specific ones. That\'s a form of attention that can\'t be performed only practiced.' },
  { n:'008', title:'Something about your honesty', body:'It doesn\'t come with an apology attached. It\'s just honest. That takes more than people realize.' },
  { n:'009', title:'You remember things',          body:'Not the obvious ones. The kind that means you were actually listening. That matters more than most things.' },
  { n:'010', title:'Today, specifically',          body:'I wanted there to be somewhere that says: you are known, you are seen, and I\'m glad you exist. Happy birthday, Faelyn.' },
];

// ─────────────────────────────────────────────────────────
// CREDENTIALS
// ─────────────────────────────────────────────────────────
const CREDS = { user: 'faelyn', pass: '2442006' };

// ─────────────────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────────────────
const $  = id => document.getElementById(id);
let opened = new Set();

// ─────────────────────────────────────────────────────────
// LOGIN
// ─────────────────────────────────────────────────────────
function attempt() {
  const u = $('u-input').value.trim().toLowerCase();
  const p = $('p-input').value.trim();
  if (u === CREDS.user && p === CREDS.pass) {
    $('s-login').classList.add('off');
    setTimeout(showBday, 850);
  } else {
    $('login-err').classList.add('show');
    [$('u-input'),$('p-input')].forEach(el => {
      el.style.borderColor = '#8a3828';
      setTimeout(() => { el.style.borderColor=''; $('login-err').classList.remove('show'); }, 1400);
    });
    $('p-input').value = '';
  }
}
$('login-btn').addEventListener('click', attempt);
[$('u-input'),$('p-input')].forEach(el =>
  el.addEventListener('keydown', e => { if(e.key==='Enter') attempt(); })
);

// ─────────────────────────────────────────────────────────
// BIRTHDAY
// ─────────────────────────────────────────────────────────
function showBday() {
  $('s-bday').classList.remove('off');
  document.querySelectorAll('.bday-el').forEach((el,i) => {
    setTimeout(() => {
      el.style.opacity    = '1';
      el.style.transform  = 'translateY(0)';
    }, i * 190 + 80);
  });
}

let bdayDone = false;
$('bday-btn').addEventListener('click', () => {
  if (bdayDone) return; bdayDone = true;
  $('s-bday').classList.add('off');
  $('s-gallery').classList.remove('off');
  initGallery();
});

// ─────────────────────────────────────────────────────────
// WEBGL INFINITE GALLERY  — bulge distortion + inertia
// ─────────────────────────────────────────────────────────
function initGallery() {
  const canvas = $('gallery-cv');
  const gl = canvas.getContext('webgl', { alpha: true, premultipliedAlpha: false });
  if (!gl) { $('gl-loading').style.display='none'; return; }

  const IW=180, IH=180, GAP=22;
  let W, H, adjBR;
  const off = {x:0,y:0};
  const drag = {on:false,lx:0,ly:0,vx:0,vy:0,moved:false};
  const INERTIA = 0.935;
  const BULGE = 0.38, BULGE_R = 1.5;

  const imgs=[], texs=[];

  function resize(){
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    const d = Math.sqrt((W/Math.min(W,H))**2+(H/Math.min(W,H))**2);
    adjBR = Math.max(BULGE_R, d*0.6*1.2);
    gl.viewport(0,0,W,H);
  }
  window.addEventListener('resize', resize);
  resize();

  /* shaders */
  const vsrc = `
  attribute vec2 aP,aT; varying vec2 vT;
  uniform vec2 uR,uO,uI; uniform float uB,uBR;
  vec2 bulge(vec2 p){
    vec2 n=p/uR,c=vec2(.5),d=n-c;
    float a=uR.x/uR.y; d.x*=a;
    float dist=length(d);
    if(dist<uBR){float t=dist/uBR,z=sqrt(.5-t*t);d*=.35+uB/z;d.x/=a;n=c+d;p=n*uR;}
    return p;
  }
  void main(){
    vec2 p=aP*vec2(${IW}.,${IH}.)+uI-uO;
    p=bulge(p);
    gl_Position=vec4(p/uR*2.-1.,0,1); vT=aT;
  }`;
  const fsrc = `precision mediump float; varying vec2 vT; uniform sampler2D uS;
  void main(){ vec4 c=texture2D(uS,vec2(vT.x,1.-vT.y)); if(c.a<.01)discard; gl_FragColor=c; }`;

  const mkS = (t,s) => {
    const sh=gl.createShader(t); gl.shaderSource(sh,s); gl.compileShader(sh); return sh;
  };
  const prog = gl.createProgram();
  gl.attachShader(prog, mkS(gl.VERTEX_SHADER,   vsrc));
  gl.attachShader(prog, mkS(gl.FRAGMENT_SHADER, fsrc));
  gl.linkProgram(prog);

  /* subdivided quad */
  const S=28, pos=[], tex=[], idx=[];
  for(let y=0;y<=S;y++) for(let x=0;x<=S;x++){ pos.push(x/S,y/S); tex.push(x/S,y/S); }
  for(let y=0;y<S;y++) for(let x=0;x<S;x++){
    const i=y*(S+1)+x;
    idx.push(i,i+1,i+S+1, i+1,i+S+2,i+S+1);
  }
  const ic = idx.length;
  const mkB = d => { const b=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER,b); gl.bufferData(gl.ARRAY_BUFFER,new Float32Array(d),gl.STATIC_DRAW); return b; };
  const pB=mkB(pos), tB=mkB(tex);
  const iB=gl.createBuffer();
  gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,iB);
  gl.bufferData(gl.ELEMENT_ARRAY_BUFFER,new Uint16Array(idx),gl.STATIC_DRAW);
  gl.enable(gl.BLEND); gl.blendFunc(gl.SRC_ALPHA,gl.ONE_MINUS_SRC_ALPHA);

  const mkTex = img => {
    const t=gl.createTexture(); gl.bindTexture(gl.TEXTURE_2D,t);
    gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,img);
    [gl.TEXTURE_WRAP_S,gl.TEXTURE_WRAP_T].forEach(p=>gl.texParameteri(gl.TEXTURE_2D,p,gl.CLAMP_TO_EDGE));
    [gl.TEXTURE_MIN_FILTER,gl.TEXTURE_MAG_FILTER].forEach(p=>gl.texParameteri(gl.TEXTURE_2D,p,gl.LINEAR));
    return t;
  };

  /* load images */
  let loaded=0;
  const total = Math.max(IMAGES.length, 1);

  IMAGES.forEach((src,i) => {
    const img = new Image();
    // No crossOrigin needed for same-origin (Netlify)
    img.src = src;
    img.onload = () => {
      imgs.push(img); texs.push(mkTex(img));
      loaded++;
      $('gl-bar').style.width = (loaded/total*100)+'%';
      $('gl-pct').textContent  = Math.floor(loaded/total*100)+'%';
    };
    img.onerror = () => {
      // skip failed image gracefully
      loaded++;
      $('gl-bar').style.width = (loaded/total*100)+'%';
    };
  });

  // reveal gallery after 1.8s or when all loaded
  let revealed = false;
  function tryReveal(){
    if(revealed) return; revealed=true;
    $('gl-loading').style.opacity='0';
    setTimeout(()=>$('gl-loading').style.display='none',700);
  }
  setTimeout(tryReveal, 1800);
  const waitAll = setInterval(()=>{ if(loaded>=total){ clearInterval(waitAll); tryReveal(); }},100);

  /* tile list */
  function tiles(){
    const tW=IW+GAP, tH=IH+GAP, out=[];
    if(!imgs.length) return out;
    const l=off.x-W, r=off.x+W*2, t=off.y-H, b=off.y+H*2;
    for(let y=Math.floor(t/tH)-1;y<=Math.ceil(b/tH)+1;y++)
      for(let x=Math.floor(l/tW)-1;x<=Math.ceil(r/tW)+1;x++){
        const ii = Math.abs((x*7919+y*7307)) % imgs.length;
        const mi = Math.abs((x*3  +y*7))    % MESSAGES.length;
        out.push({wx:x*tW, wy:y*tH, ii, mi});
      }
    return out;
  }

  /* render */
  function render(){
    if(!imgs.length) return;
    gl.viewport(0,0,W,H);
    gl.clearColor(0,0,0,0); gl.clear(gl.COLOR_BUFFER_BIT);
    gl.useProgram(prog);
    const attr=(n,b)=>{ const l=gl.getAttribLocation(prog,n); gl.enableVertexAttribArray(l); gl.bindBuffer(gl.ARRAY_BUFFER,b); gl.vertexAttribPointer(l,2,gl.FLOAT,false,0,0); };
    attr('aP',pB); attr('aT',tB);
    gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER,iB);
    const u2=(n,a,b)=>gl.uniform2f(gl.getUniformLocation(prog,n),a,b);
    const u1=(n,v)  =>gl.uniform1f(gl.getUniformLocation(prog,n),v);
    u2('uR',W,H); u1('uB',BULGE); u1('uBR',adjBR);
    tiles().forEach(t=>{
      u2('uO',off.x,off.y); u2('uI',t.wx,t.wy);
      gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D,texs[t.ii]);
      gl.uniform1i(gl.getUniformLocation(prog,'uS'),0);
      gl.drawElements(gl.TRIANGLES,ic,gl.UNSIGNED_SHORT,0);
    });
  }

  /* hit test */
  function tileAt(cx,cy){
    if(!imgs.length) return null;
    const tW=IW+GAP, tH=IH+GAP;
    const wx=cx+off.x, wy=cy+off.y;
    const tx=Math.floor(wx/tW), ty=Math.floor(wy/tH);
    const lx=wx-tx*tW, ly=wy-ty*tH;
    if(lx>IW||ly>IH) return null; // in the gap
    return Math.abs((tx*3+ty*7)) % MESSAGES.length;
  }

  /* events */
  canvas.addEventListener('mousedown',e=>{ drag.on=true;drag.lx=e.clientX;drag.ly=e.clientY;drag.moved=false; });
  window.addEventListener('mousemove',e=>{
    if(!drag.on)return;
    const dx=e.clientX-drag.lx, dy=e.clientY-drag.ly;
    if(Math.abs(dx)>3||Math.abs(dy)>3) drag.moved=true;
    drag.vx=dx*.28+drag.vx*.72; drag.vy=dy*.28+drag.vy*.72;
    off.x-=drag.vx; off.y-=drag.vy;
    drag.lx=e.clientX; drag.ly=e.clientY;
  });
  window.addEventListener('mouseup',e=>{
    if(drag.on&&!drag.moved){ const mi=tileAt(e.clientX,e.clientY); if(mi!==null)openMsg(mi); }
    drag.on=false;
  });
  canvas.addEventListener('touchstart',e=>{ e.preventDefault();drag.on=true;drag.lx=e.touches[0].clientX;drag.ly=e.touches[0].clientY;drag.moved=false; },{passive:false});
  window.addEventListener('touchmove',e=>{
    if(!drag.on)return; e.preventDefault();
    const dx=e.touches[0].clientX-drag.lx, dy=e.touches[0].clientY-drag.ly;
    if(Math.abs(dx)>3||Math.abs(dy)>3) drag.moved=true;
    drag.vx=dx*.28+drag.vx*.72; drag.vy=dy*.28+drag.vy*.72;
    off.x-=drag.vx; off.y-=drag.vy;
    drag.lx=e.touches[0].clientX; drag.ly=e.touches[0].clientY;
  },{passive:false});
  window.addEventListener('touchend',e=>{
    if(drag.on&&!drag.moved){ const t=e.changedTouches[0]; const mi=tileAt(t.clientX,t.clientY); if(mi!==null)openMsg(mi); }
    drag.on=false;
  });
  canvas.addEventListener('wheel',e=>{ e.preventDefault(); drag.vx+=e.deltaX*.42; drag.vy+=e.deltaY*.42; },{passive:false});

  function loop(){
    if(!drag.on){
      off.x-=drag.vx; off.y-=drag.vy;
      drag.vx*=INERTIA; drag.vy*=INERTIA;
      if(Math.abs(drag.vx)<.01)drag.vx=0;
      if(Math.abs(drag.vy)<.01)drag.vy=0;
    }
    render();
    requestAnimationFrame(loop);
  }
  loop();
}

// ─────────────────────────────────────────────────────────
// MODAL
// ─────────────────────────────────────────────────────────
function openMsg(i){
  const m=MESSAGES[i];
  $('modal-n').textContent     = m.n;
  $('modal-title').textContent = m.title;
  $('modal-body').textContent  = m.body;
  $('modal').classList.add('on');
  if(!opened.has(i)){ opened.add(i); updatePips(); }
}
$('modal-x').addEventListener('click',()=>$('modal').classList.remove('on'));
$('modal').addEventListener('click',e=>{ if(e.target===$('modal'))$('modal').classList.remove('on'); });

function updatePips(){ for(let i=0;i<5;i++) $('p'+i).classList.toggle('on',i<opened.size); }

// ─────────────────────────────────────────────────────────
// AMBIENT MUSIC (Web Audio — no file needed)
// ─────────────────────────────────────────────────────────
// ─────────────────────────────────────────────────────────
// MUSIC (real audio + smooth fade)
// ─────────────────────────────────────────────────────────
const audio = new Audio('music.mp3'); // or 'audio/music.mp3' if you use a folder
audio.loop = true;

let fadeInterval = null;
let musicOn = false;

function fadeIn() {
  clearInterval(fadeInterval);
  audio.volume = 0;
  audio.play().catch(() => {});
  
  fadeInterval = setInterval(() => {
    if (audio.volume < 0.6) {
      audio.volume += 0.02;
    } else {
      audio.volume = 0.6;
      clearInterval(fadeInterval);
    }
  }, 100);
}

function fadeOut() {
  clearInterval(fadeInterval);
  
  fadeInterval = setInterval(() => {
    if (audio.volume > 0.02) {
      audio.volume -= 0.02;
    } else {
      audio.volume = 0;
      audio.pause();
      clearInterval(fadeInterval);
    }
  }, 100);
}

$('music-btn').addEventListener('click', () => {
  if (!musicOn) {
    fadeIn();
    $('music-btn').classList.add('on');
  } else {
    fadeOut();
    $('music-btn').classList.remove('on');
  }
  musicOn = !musicOn;
});
</script>
